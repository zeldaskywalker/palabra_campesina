{% load static %}
{% include "english/header.html" %}

<div class="galeria_container">
    <div id="galeria_title">
        <h1>{{data.title}}</h1>
        <h1>
        <a href="/gallery">
            <button id="return_to_galeria_button" type="button" class="btn btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"></path></svg>
                return to gallery
            </button>
        </a>
        </h1>
    </div>
    <figure id="galeria_figure">
        <div class="{{data.style}}" id="galeria_img_wrapper_{{data.style}}">
            <img id="solo_galeria_image" fetchpriority="high" src="{% with data.image|first as first_file %}{{ first_file.url }}{% endwith %}" alt="{{data.title}}">
            <div class="quote_overlay" id="galeria_quote_{{data.style}}">
                {{data.description}}
            </div>
        </div>
        <figcaption class="{{data.style}}"><i>{{data.credit}}</i></figcaption>
    </figure>
</div>
<script src="{% static '/scripts/solo_galeria.js' %}"></script>
{% include "english/footer.html" %}
