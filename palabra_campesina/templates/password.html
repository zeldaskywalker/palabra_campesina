<!DOCTYPE html>
    {% load static %}

    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
        <link rel="stylesheet" href="{% static 'css/global.css' %}">
        <link rel="icon" type="image/png" href="{% static '/images/favicon.png' %}"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BIENVENIDA</title>
    </head>

    <div style="text-align: center;">
        <a href="/"><img id="logo-welcome" src="{% static '/images/logo.png' %}" alt="Palabra Campesina"></a>
        <form method="post">
            {% csrf_token %}
            <input type="text" id="password" name="password" placeholder="contraseña">
            <button type="submit">entrar</button>
        </form>
    </div>

    <div style="text-align: center;">
        <p style="padding-top: 10px; font-weight: bold;">
            about | request access
        </p>
    </div>

    <div style="text-align: center;">
        {% if messages %}
            {% for message in messages %}
                <div> {{ message }} </div>
            {% endfor %}
        {% endif %}
    </div>
</html>
